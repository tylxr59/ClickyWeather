<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClickyWeather Icon Preview</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a1a;
      color: #fff;
      padding: 20px;
      margin: 0;
    }
    h1 {
      text-align: center;
      margin-top: 0;
    }
    .controls {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    label {
      font-weight: 500;
      font-size: 14px;
    }
    input, select {
      padding: 8px;
      border: 1px solid #444;
      border-radius: 4px;
      background: #2a2a2a;
      color: #fff;
      font-size: 14px;
    }
    .preview-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .preview-card {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
    }
    .preview-card h3 {
      margin-top: 0;
      font-size: 14px;
      color: #aaa;
    }
    canvas {
      display: block;
      border: 1px solid #444;
      border-radius: 4px;
      background: #1a1a1a;
      margin: 10px auto;
    }
    .size-label {
      font-size: 12px;
      color: #888;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>⚠️ ClickyWeather Icon Preview</h1>
  
  <div class="controls">
    <div class="control-group">
      <label for="iconSize">Icon Size (px)</label>
      <input type="range" id="iconSize" min="20" max="100" value="40">
      <span id="sizeDisplay">40px</span>
    </div>
    <div class="control-group">
      <label for="bgColor">Background Color</label>
      <input type="color" id="bgColor" value="#1a1a1a">
    </div>
    <div class="control-group">
      <label for="alertColor">Alert Color</label>
      <select id="alertColor">
        <option value="#FF0000">Red (Tornado)</option>
        <option value="#FF8000">Orange (Wind/Heat)</option>
        <option value="#00FF00">Green (All Clear)</option>
        <option value="#00FFFF">Cyan (Cold)</option>
        <option value="#0000FF">Blue (Flood)</option>
        <option value="#CCCCCC">Light Gray (Winter)</option>
      </select>
    </div>
  </div>

  <div class="preview-container">
    <div class="preview-card">
      <h3>Warning Triangle (Header Size)</h3>
      <canvas id="headerCanvas" width="160" height="160"></canvas>
      <div class="size-label">18px</div>
    </div>
    <div class="preview-card">
      <h3>Warning Triangle (Body Size - Rectangular)</h3>
      <canvas id="bodyRectCanvas" width="160" height="160"></canvas>
      <div class="size-label">36px</div>
    </div>
    <div class="preview-card">
      <h3>Warning Triangle (Body Size - Round)</h3>
      <canvas id="bodyRoundCanvas" width="160" height="160"></canvas>
      <div class="size-label">40px</div>
    </div>
  </div>

  <script>
    // Pebble color mappings (approximations)
    const PEBBLE_COLORS = {
      white: '#FFFFFF',
      black: '#000000',
      lightGray: '#CCCCCC',
      darkGray: '#555555',
      red: '#FF0000',
      orange: '#FF8000',
      green: '#00FF00',
      cyan: '#00FFFF',
      blue: '#0000FF',
      islamicGreen: '#00AA00'
    };

    function drawWarningTriangle(ctx, centerX, centerY, size, color, bgColor) {
      const half = size / 2;
      const topY = centerY - half;
      const botY = centerY + half;
      const botX = half;

      // Draw filled triangle
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(centerX, topY);
      ctx.lineTo(centerX - botX, botY);
      ctx.lineTo(centerX + botX, botY);
      ctx.closePath();
      ctx.fill();

      // Draw exclamation mark
      const cx = centerX;
      const centerY_visual = centerY + size / 6;  // Visual centroid adjustment
      const lineTopY = centerY_visual - size / 3.2;  // Slightly longer line
      const lineBotY = centerY_visual - size / 22;   // Slightly longer at bottom
      const dotY = centerY_visual + size / 5;        // Move dot down more

      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = size / 8;  // Make line much thicker
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(cx, lineTopY);
      ctx.lineTo(cx, lineBotY);
      ctx.stroke();

      // Draw dot - smaller
      ctx.fillStyle = '#FFFFFF';
      const dotRadius = size / 16;  // Much smaller dot
      ctx.beginPath();
      ctx.arc(cx, dotY, dotRadius, 0, Math.PI * 2);
      ctx.fill();
    }

    function renderAll() {
      const size = parseInt(document.getElementById('iconSize').value);
      const bgColor = document.getElementById('bgColor').value;
      const alertColor = document.getElementById('alertColor').value;

      document.getElementById('sizeDisplay').textContent = size + 'px';

      // Header size preview (18px)
      const headerCanvas = document.getElementById('headerCanvas');
      const headerCtx = headerCanvas.getContext('2d');
      headerCtx.fillStyle = bgColor;
      headerCtx.fillRect(0, 0, headerCanvas.width, headerCanvas.height);
      drawWarningTriangle(headerCtx, 80, 80, 18, alertColor, bgColor);

      // Body size preview - rectangular (36px)
      const bodyRectCanvas = document.getElementById('bodyRectCanvas');
      const bodyRectCtx = bodyRectCanvas.getContext('2d');
      bodyRectCtx.fillStyle = bgColor;
      bodyRectCtx.fillRect(0, 0, bodyRectCanvas.width, bodyRectCanvas.height);
      drawWarningTriangle(bodyRectCtx, 80, 80, 36, alertColor, bgColor);

      // Body size preview - round (40px)
      const bodyRoundCanvas = document.getElementById('bodyRoundCanvas');
      const bodyRoundCtx = bodyRoundCanvas.getContext('2d');
      bodyRoundCtx.fillStyle = bgColor;
      bodyRoundCtx.fillRect(0, 0, bodyRoundCanvas.width, bodyRoundCanvas.height);
      drawWarningTriangle(bodyRoundCtx, 80, 80, 40, alertColor, bgColor);
    }

    document.getElementById('iconSize').addEventListener('input', renderAll);
    document.getElementById('bgColor').addEventListener('change', renderAll);
    document.getElementById('alertColor').addEventListener('change', renderAll);

    // Initial render
    renderAll();
  </script>
</body>
</html>
